<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder Pro</title>
    <!-- Local Bootstrap CSS -->
    <link href="/assets/bootstrap/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">ResumeBuilder Pro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#elNavbarNav" aria-controls="elNavbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="elNavbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="btnNavHome">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="btnNavResume">Preview Resume</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container my-5" id="elMainContent">
        <!-- Home Section (Data Entry) -->
        <section id="elSectionHome">
            <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border">
                <div class="container-fluid py-5 text-center">
                    <h1 class="display-5 fw-bold">Welcome to ResumeBuilder Pro</h1>
                    <p class="col-md-8 mx-auto fs-4">Build your professional resume quickly and easily. Start by adding your details below.</p>
                </div>
            </div>
            <!-- Future Data Entry Forms will go here -->
            <div class="alert alert-info text-center">
                Data entry forms are coming in Phase 3!
            </div>
        </section>

        <!-- Resume Preview Section -->
        <section id="elSectionResume" class="d-none">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <h2 class="card-title">Your Resume Preview</h2>
                    <p class="card-text text-muted">Coming in Phase 4...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Local Bootstrap JS -->
    <script src="/assets/bootstrap/bootstrap.bundle.min.js"></script>
    <!-- Application Logic -->
    <script src="/js/app.js"></script>
</body>
</html>
