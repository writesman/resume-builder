<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder Pro</title>
    <!-- Local Bootstrap CSS -->
    <link href="/assets/bootstrap/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm d-print-none">
        <div class="container">
            <a class="navbar-brand" href="#">ResumeBuilder Pro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#elNavbarNav" aria-controls="elNavbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="elNavbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="btnNavHome">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="btnNavResume">Preview Resume</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container my-5" id="elMainContent">
        <!-- Home Section (Data Entry) -->
        <section id="elSectionHome">
            <div class="p-4 mb-4 bg-white rounded-3 shadow-sm border">
                <h1 class="display-6 fw-bold">ResumeBuilder Pro</h1>
                <p class="fs-5 text-muted">Add your details below to generate your professional resume.</p>
            </div>
            
            <div class="row">
                <!-- Left Column: Personal Info & Skills -->
                <div class="col-md-6 mb-4">
                    <!-- Personal Info -->
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-body">
                            <h3 class="card-title h5 mb-3">Personal Information</h3>
                            <form id="formPersonalInfo">
                                <div class="mb-3">
                                    <label class="form-label text-secondary small fw-bold">FULL NAME</label>
                                    <input type="text" class="form-control" id="txtName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small fw-bold">EMAIL</label>
                                    <input type="email" class="form-control" id="txtEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small fw-bold">PHONE</label>
                                    <input type="text" class="form-control" id="txtPhone">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small fw-bold">ADDRESS</label>
                                    <input type="text" class="form-control" id="txtAddress">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small fw-bold">LINKS (LinkedIn, GitHub)</label>
                                    <textarea class="form-control" id="txtLinks" rows="2"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnSavePersonalInfo">Save Personal Info</button>
                            </form>
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="card shadow-sm border-0">
                        <div class="card-body">
                            <h3 class="card-title h5 mb-3">Skills</h3>
                            <form id="formSkill" class="mb-3 row g-2">
                                <div class="col-md-5">
                                    <input type="text" class="form-control" id="txtSkillCategory" placeholder="Category (e.g. Languages)" required>
                                </div>
                                <div class="col-md-5">
                                    <input type="text" class="form-control" id="txtSkillName" placeholder="Skill Name" required>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-success w-100 fw-bold" id="btnAddSkill">+</button>
                                </div>
                            </form>
                            <div id="divSkillList" class="mt-3"></div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Jobs and Education -->
                <div class="col-md-6 mb-4">
                    <!-- Education -->
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-body">
                            <h3 class="card-title h5 mb-3">Education</h3>
                            <form id="formEducation" class="mb-3">
                                <div class="row g-2 mb-2">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtEduSchool" placeholder="School Name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtEduDegree" placeholder="Degree / Major" required>
                                    </div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtEduStart" placeholder="Start Date" required>
                                    </div>
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtEduEnd" placeholder="End Date">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <input type="text" class="form-control" id="txtEduGpa" placeholder="GPA (Optional)">
                                </div>
                                <div class="mb-3">
                                    <textarea class="form-control" id="txtEduHonors" rows="2" placeholder="Honors / Awards (Optional, one per line)"></textarea>
                                </div>
                                <div class="mb-3">
                                    <textarea class="form-control" id="txtEduActivities" rows="2" placeholder="Activities / Societies (Optional, one per line)"></textarea>
                                </div>
                                <button type="submit" class="btn btn-success w-100 fw-bold" id="btnAddEducation">Add Education</button>
                            </form>
                            <div class="list-group mt-3" id="divEducationList"></div>
                        </div>
                    </div>

                    <!-- Jobs -->
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-body">
                            <h3 class="card-title h5 mb-3">Work Experience</h3>
                            <form id="formJob" class="mb-3">
                                <div class="row g-2 mb-2">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtJobCompany" placeholder="Company Name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtJobTitle" placeholder="Job Title" required>
                                    </div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtJobStart" placeholder="Start Date (e.g. May 2023)" required>
                                    </div>
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="txtJobEnd" placeholder="End Date (e.g. Present)">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <textarea class="form-control" id="txtJobResponsibilities" rows="3" placeholder="Responsibilities / Details (one per line)"></textarea>
                                </div>
                                <button type="submit" class="btn btn-success w-100 fw-bold" id="btnAddJob">Add Job</button>
                            </form>
                            <div class="list-group mt-3" id="divJobList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Resume Preview Section -->
        <section id="elSectionResume" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4 d-print-none">
                <h2 class="h3 m-0">Resume Preview</h2>
                <button class="btn btn-primary fw-bold shadow-sm" id="btnPrintResume">
                    Print / Save as PDF
                </button>
            </div>
            
            <!-- The Actual Resume Page (styled like a piece of paper) -->
            <div class="card shadow border-0" id="elResumeDocument" style="min-height: 1056px; max-width: 8.5in; margin: 0 auto;">
                <div class="card-body p-5">
                    <!-- Header (Name & Contact) -->
                    <div class="text-center mb-4 border-bottom pb-4">
                        <h1 class="display-5 fw-bold text-uppercase mb-2 text-dark" id="lblResumeName">Your Name</h1>
                        <p class="fs-6 text-secondary mb-1" id="lblResumeContact">
                            Phone | Email | Address
                        </p>
                        <p class="text-primary mb-0 small" id="lblResumeLinks"></p>
                    </div>

                    <!-- Education -->
                    <div class="mb-4">
                        <h4 class="text-uppercase border-bottom pb-2 mb-3 text-secondary h5 fw-bold tracking-wide">Education</h4>
                        <div id="divResumeEducation">
                            <!-- Education injected here via JS -->
                        </div>
                    </div>

                    <!-- Work Experience -->
                    <div class="mb-4">
                        <h4 class="text-uppercase border-bottom pb-2 mb-3 text-secondary h5 fw-bold tracking-wide">Professional Experience</h4>
                        <div id="divResumeJobs">
                            <!-- Jobs injected here via JS -->
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="mb-4">
                        <h4 class="text-uppercase border-bottom pb-2 mb-3 text-secondary h5 fw-bold tracking-wide">Technical Skills</h4>
                        <div id="divResumeSkills">
                            <!-- Skills injected here via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Local Bootstrap JS -->
    <script src="/assets/bootstrap/bootstrap.bundle.min.js"></script>
    <!-- Application Logic -->
    <script src="/js/api.js"></script>
    <script src="/js/forms.js"></script>
    <script src="/js/preview.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
